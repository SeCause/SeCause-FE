name: Build & Deploy to https://github.com/chaeyoungwon/SeCause-FE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    container: pandoc/latex

    steps:
      - name: Checkout source
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare output
        shell: sh
        run: |
          # enable extglob and dotglob might not work in sh
          # Use alternative commands for file copying
          rm -rf output
          mkdir output
          # Use find command instead of extglob pattern
          find . -mindepth 1 -maxdepth 1 \
            ! -name "output" \
            ! -name ".git" \
            ! -name ".github" \
            -exec cp -R {} output/ \;

      - name: Push to https://github.com/chaeyoungwon/SeCause-FE
        id: push
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.SECAUSE_PAT}}
        with:
          source-directory: 'output'
          destination-github-username: chaeyoungwon
          destination-repository-name: SeCause-FE
          user-name: GitHub Actions
          user-email: epopcy@naver.com
          commit-message: 'Deploy from build: ${{ github.sha }}'
          target-branch: main

      - name: 'Debug: show cloned dir'
        run: echo "Cloned into $DESTINATION_CLONED_DIRECTORY"
